<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User Input Echo App</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        max-width: 720px;
        margin: 3rem auto;
        padding: 0 1rem;
      }
      form {
        display: flex;
        gap: 0.5rem;
      }
      input[type='text'] {
        flex: 1;
        padding: 0.6rem;
        font-size: 1rem;
      }
      button {
        padding: 0.6rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }
      .result {
        margin-top: 1rem;
        padding: 0.8rem;
        background: #f5f7fb;
        border: 1px solid #d7dce6;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>User Input Echo App</h1>
    <p>Enter text and submit to see it echoed back.</p>

    <form action="/echo" method="post">
      <input type="text" name="user_input" placeholder="Type something..." required />
      <button type="submit">Submit</button>
    </form>

    {% if echoed_text is defined %}
      <div class="result">
        <strong>You entered:</strong> {{ echoed_text }}
      </div>
    {% endif %}
  </body>
</html>
